name: Task08 action

on: 
  push:
  workflow_dispatch:

jobs:
  Task08:
    runs-on: ubuntu-latest
    steps:
    - name: Clone project
      uses: actions/checkout@v6

    - name: Install java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: maven
    
    - name: Download dependencies
      run: mvn -f GitAction/pom.xml dependency:resolve
    
    - name: Create build
      run: mvn -f GitAction/pom.xml clean package

    - name: Run tests
      run: mvn -f GitAction/pom.xml test
